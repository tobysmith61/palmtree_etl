name: Deploy to EC2 Test

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-22.04

    steps:
      # 1. Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup SSH key for EC2
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_GITHUB }}" > ~/.ssh/githubactions
          chmod 600 ~/.ssh/githubactions
          ssh-keyscan -H 18.169.146.55 >> ~/.ssh/known_hosts

      # 3. Deploy to EC2
      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/githubactions ubuntu@18.169.146.55 << 'EOF'
            set -e
            set -x  # debug: prints each command

            cd /home/ubuntu/palmtree_etl

            echo "Pulling latest code..."
            git pull origin main

            echo "Setting up virtualenv (if not exists)..."
            if [ ! -d "venv" ]; then
              python3.10 -m venv venv
            fi

            source venv/bin/activate

            echo "Upgrading pip..."
            pip install --upgrade pip setuptools wheel

            echo "Installing dependencies..."
            pip install -r requirements.txt

            echo "Running migrations..."
            python manage.py migrate --noinput --database=migrate

            echo "Collecting static files..."
            python manage.py collectstatic --noinput

            echo "Importing fixtures BEFORE services start..."
            python manage.py import_fixtures --dir=fixtures

            echo "Restarting services in correct order..."

            echo "Restarting app (palmtree)..."
            sudo systemctl restart palmtree.service
            sudo systemctl is-active palmtree.service

            echo "Restarting celery worker..."
            sudo systemctl restart celery.service
            sudo systemctl is-active celery.service

            echo "Restarting celery beat..."
            sudo systemctl restart celery-beat.service
            sudo systemctl is-active celery-beat.service

            echo "Deployment complete."
          EOF